services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: 100x-pm
      POSTGRES_PASSWORD: 100x-pm
      POSTGRES_DB: 100x-pm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 100x-pm -d 100x-pm"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://100x-pm:100x-pm@db:5432/100x-pm
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - 100x-pm-data:/100x-pm
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  100x-pm-data:
